<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Tracker — Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
body { background: linear-gradient(135deg, #5C6BC0 0%, #26C6DA 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { background: white; border-radius: 24px; padding: 36px 32px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
.brand { text-align: center; margin-bottom: 32px; }
.brand i { font-size: 3rem; color: #5C6BC0; }
.brand h1 { font-size: 1.75rem; font-weight: 800; color: #1a1a2e; margin: 8px 0 4px; }
.brand p { color: #6b7280; font-size: 0.9rem; margin: 0; }
.form-control { border-radius: 12px; padding: 12px 16px; border: 1.5px solid #e5e7eb; font-size: 0.95rem; }
.form-control:focus { border-color: #5C6BC0; box-shadow: 0 0 0 3px rgba(92,107,192,.15); }
.btn-login { background: #5C6BC0; border: none; border-radius: 12px; padding: 13px; font-size: 1rem; font-weight: 600; width: 100%; color: white; margin-top: 8px; }
.btn-login:hover { background: #3949AB; color: white; }
.input-group-text { background: #f8f9fa; border-radius: 12px 0 0 12px; border: 1.5px solid #e5e7eb; border-right: none; }
</style>
</head>
<body>
<div class="login-card">
  <div class="brand">
    <img src="/icons/logo.png" alt="Logo" style="height: 80px; width: 80px; object-fit: contain; margin-bottom: 16px;">
    <h1>Budget Tracker</h1>
    <p>Your personal finance tracker</p>
  </div>
  {% if form.errors %}
  <div class="alert alert-danger rounded-3 py-2 mb-3">Invalid username or password.</div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-600 text-muted small text-uppercase">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person text-muted"></i></span>
        <input type="text" name="username" class="form-control" placeholder="Enter username" autocomplete="username" required style="border-radius: 0 12px 12px 0; border-left: none;">
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-600 text-muted small text-uppercase">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
        <input type="password" name="password" class="form-control" placeholder="Enter password" autocomplete="current-password" required style="border-radius: 0 12px 12px 0; border-left: none;">
      </div>
    </div>
    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit" class="btn-login"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
